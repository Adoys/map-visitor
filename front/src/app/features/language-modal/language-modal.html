<p-confirmDialog></p-confirmDialog>

<div class="flex justify-content-between align-items-center mb-3">
  <button pButton label="{{ 'LANGUAGES.ADD' | translate }}" icon="pi pi-plus" (click)="openCreateModal()"></button>
</div>

<p-table [value]="languages" [loading]="loading" dataKey="id" responsiveLayout="scroll">
  <ng-template pTemplate="header">
    <tr>
      <th>{{ 'LANGUAGES.CODE' | translate }}</th>
      <th>{{ 'LANGUAGES.NAME' | translate }}</th>
      <th>{{ 'LANGUAGES.DEFAULT' | translate }}</th>
      <th>{{ 'LANGUAGES.FLAG' | translate }}</th>
      <th style="width:140px">{{ 'COMMON_LABELS.ACTIONS' | translate }}</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-lang>
    <tr>
      <td>{{ lang.code }}</td>
      <td>{{ lang.name }}</td>
      <td>
        @if(lang.isDefault) {
        <i class="pi pi-check text-green-500"></i>
        } @else {
        <i class="pi pi-times text-red-500"></i>
        }
      </td>
      <td>
        @if(lang.flag) {
        <img [src]="lang.flag" style="width: 30px; height: 20px; object-fit: cover; border: 1px solid #ccc;">
        }
      </td>
      <td>
        <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-text"
          (click)="openEditModal(lang)"></button>
        <button pButton icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger"
          (click)="confirmDelete(lang)"></button>
      </td>
    </tr>
  </ng-template>
</p-table>
