<section class="poi-modal">
  <p class="poi-modal__eyebrow">Punto de interes</p>
  <h2 class="poi-modal__title">{{ point.label }}</h2>
  <p class="poi-modal__description">{{ point.description }}</p>

  <div class="poi-modal__meta">
    <span>Coordenada X: {{ point.x | number:'1.0-0' }}</span>
    <span>Coordenada Y: {{ point.y | number:'1.0-0' }}</span>
  </div>

  <p class="poi-modal__note">
    Este componente es un placeholder listo para sustituirse por la ficha completa del punto de interes.
  </p>
</section>
