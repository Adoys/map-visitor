<div class="map-shell">
  <div class="map-toolbar">
    <span class="role-pill">{{ roleLabel }}</span>
    <span class="map-hint">
      @if (isAdmin) {
        Click izquierdo para inspeccionar, click derecho para crear puntos.
      } @else {
        Click izquierdo para consultar informacion.
      }
    </span>
  </div>

  <div #mapHost class="map-host">
    @if (showContextMenu) {
      <div
        class="context-menu"
        [style.left.px]="contextMenuPosition.x"
        [style.top.px]="contextMenuPosition.y"
      >
        @for (option of contextOptions; track option.type) {
          <button type="button" class="context-menu__button" (click)="addPointFromContextMenu(option.type)">
            {{ option.label }}
          </button>
        }
      </div>
    }

    @if (!isReady) {
      <div class="map-loading">Cargando mapa...</div>
    }
  </div>
</div>
