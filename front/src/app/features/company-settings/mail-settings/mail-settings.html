<form [formGroup]="form" (ngSubmit)="submit()" class="p-fluid p-4" style="min-width: 480px;">

  <div class="grid">
    <div class="field mb-3 form-row margin-bottom">
      <label for="host" class="font-semibold mb-1 block">{{ 'SETTINGS.EMAIL.HOST' | translate }}</label>
      <input pInputText formControlName="host" class="w-full" />
    </div>

    <div class="field mb-3 form-row margin-bottom">
      <label for="port" class="font-semibold mb-1 block">{{ 'SETTINGS.EMAIL.PORT' | translate }}</label>
      <input pInputText type="number" formControlName="port" class="w-full" />
    </div>

    <div class="field mb-3 form-row margin-bottom">
      <label for="security" class="font-semibold mb-1 block">{{ 'SETTINGS.EMAIL.SECURITY' | translate }}</label>
      <p-select [options]="securityOptions" formControlName="security" optionLabel="label" style="min-width: 130px;"
        optionValue="value"></p-select>
    </div>

    <div class="field mb-3 form-row margin-bottom">
      <label for="email" class="font-semibold mb-1 block">{{ 'SETTINGS.EMAIL.EMAIL_FROM' | translate }}</label>
      <input pInputText formControlName="email" class="w-full" type="email" />
    </div>

    <div class="field mb-3 form-row margin-bottom">
      <label for="username" class="font-semibold mb-1 block">{{ 'SETTINGS.EMAIL.USERNAME' | translate }}</label>
      <input pInputText formControlName="username" class="w-full" />
    </div>

    <div class="field mb-3 form-row margin-bottom">
      <label for="password" class="font-semibold mb-1 block">{{ 'SETTINGS.EMAIL.PASSWORD' | translate }}</label>
      <input pPassword type="password" formControlName="password" [feedback]="false" />
    </div>
  </div>

  <div style="display: flex; justify-content: space-between">
    <button pButton [label]="'SETTINGS.EMAIL.TEST_BUTTON' | translate" icon="pi pi-send" (click)="testConnection()"
      [loading]="testing" class="mt-3" type="button" [disabled]="form.invalid"></button>

    <button pButton type="submit" [label]="'COMMON_LABELS.SAVE' | translate" icon="pi pi-save"
      class="mt-4 p-button-success" [disabled]="form.invalid"></button>
  </div>

  <p-dialog [header]="'SETTINGS.EMAIL.TEST_TITLE' | translate" [(visible)]="showTestDialog" [modal]="true"
    [style]="{ width: '30rem' }">

    <div class="field">
      <label class="font-semibold mb-2 block">
        {{ 'SETTINGS.EMAIL.TEST_EMAIL' | translate }}
      </label>

      <input pInputText formControlName="testEmail" class="w-full" type="email" />
    </div>

    <div class="flex justify-content-end gap-2 mt-4">
      <button pButton type="button" severity="secondary" [label]="'COMMON_LABELS.CANCEL' | translate"
        (click)="showTestDialog = false">
      </button>

      <button pButton type="button" icon="pi pi-send" [label]="'COMMON_LABELS.TEST' | translate" [loading]="testing"
        (click)="confirmTestConnection()">
      </button>
    </div>
  </p-dialog>
</form>
