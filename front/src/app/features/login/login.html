<div class="login-container">
    <p-card class="login-card">
        <h2 class="title">{{ 'LOGIN.TITLE' | translate }}</h2>
        <p class="subtitle">{{ 'LOGIN.SUB_TITLE' | translate }}</p>

        <div class="p-fluid form">
            <div class="field">
                <label for="user">{{ 'LOGIN.USER' | translate }}</label>
                <input id="user" type="text" pInputText [(ngModel)]="username"
                    placeholder="{{ 'LOGIN.USER_PLACEHOLDER' | translate }}" />
            </div>
            <div class="field">
                <label for="pass">{{ 'LOGIN.PASSWORD' | translate }}</label>
                <input id="pass" type="password" pPassword [(ngModel)]="password" feedback="false"
                    placeholder="{{ 'LOGIN.PASSWORD_PLACEHOLDER' | translate }}" />
            </div>
            <div class="button-container">
                <p-button label="{{ 'LOGIN.LOGIN_BUTTON' | translate }}" icon="pi pi-sign-in" class="login-button"
                    severity="success" (onClick)="login()"></p-button>
                <p-button label="{{ 'LOGIN.RETURN_BUTTON' | translate }}" icon="pi pi-sign-in" class="return-button"
                    severity="secondary" (onClick)="return()"></p-button>
            </div>
            <div class="forgot-password">
                <a href="#" (click)="recoverPassword(); $event.preventDefault()">{{ 'LOGIN.RECOVER_PASSWORD' | translate
                    }}</a>
            </div>
        </div>
    </p-card>
</div>
