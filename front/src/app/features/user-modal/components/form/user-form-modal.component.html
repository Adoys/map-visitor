<form [formGroup]="form" (ngSubmit)="submit()" class="p-fluid p-4" style="min-width: 480px;">
  <!-- Identificador -->
  <div class="field mb-3 form-row margin-bottom">
    <label for="userId" class="font-semibold mb-1 block">{{'USERS.IDENTIFIER' | translate}}</label>
    <input id="userId" pInputText formControlName="userId" class="w-full"
      placeholder="{{'USERS.IDENTIFIER_PLACEHOLDER' | translate}}" />
  </div>

  <!-- Email -->
  <div class="field mb-3 form-row margin-bottom">
    <label for="email" class="font-semibold mb-1 block">{{'USERS.EMAIL' | translate}}</label>
    <input id="email" pInputText formControlName="email" class="w-full" placeholder="{{'USERS.EMAIL' | translate}}" />
  </div>

  <!-- Rol -->
  <div class="field mb-3 form-row margin-bottom">
    <label for="role" class="font-semibold mb-1 block">{{'USERS.ROLE' | translate}}</label>
    <p-select [options]="roles" style="min-width: 219px;" formControlName="role" class="w-full" optionLabel="name"
      optionValue="code" placeholder="{{'USERS.ROLE' | translate}}" />
  </div>

  <!-- Password -->
  @if(!editMode) {
  <div class="field mb-3 form-row margin-bottom">
    <label for="password" class="font-semibold mb-1 block">{{'USERS.PASSWORD' | translate}}</label>
    <input id="password" type="password" pInputText formControlName="password" class="w-full"
      placeholder="{{'USERS.PASSWORD' | translate}}" />
  </div>
  }

  <div class="div-separator"></div>

  <!-- Botones -->
  <div class="flex justify-content-end gap-2 mt-4">
    <button pButton type="button" label="{{'COMMON_LABELS.CANCEL' | translate}}" class="p-button-text"
      (click)="ref.close()"></button>

    <button pButton type="submit" label="{{'COMMON_LABELS.SAVE' | translate}}" class="p-button-success"
      [disabled]="form.invalid"></button>
  </div>

</form>
